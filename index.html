<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Monsieur+La+Doulaise&display=swap"
    rel="stylesheet">
  <title>Showtime Lakers</title>
</head>

<body>

  <main>

    <section class="hero" aria-labelledby="hero-title">

      <video class="hero-video" autoplay muted loop playsinline>
        <source src="/src/assets/videos/crypto-arena.mp4" type="video/mp4">
      </video>

      <div class="hero-overlay" aria-hidden="true"></div>

      <div class="intro-screen"></div>

      <header class="hero-content">

        <div class="hero-logos">

          <img src="/src/assets/logos/nba_logo.png" alt="NBA Logo" class="hero-left logo-left">

          <img src="/src/assets/logos/lakers_logo.png" alt="Lakers Logo" class="hero-right logo-right">

        </div>

        <h1 id="hero-title" class="hero-title">
          Showtime Lakers
        </h1>

        <p class="hero-subtitle">
          World of the Purple Gold Greatness.
        </p>

        <img src="/src/assets/logos/nike-seeklogo.png" alt="Nike" class="nike-logo" />
        <button class="hero-btn">
          Explore Dynasty
        </button>

      </header>

    </section>
  </main>


  <script type="module" src="/src/main.js"></script>

  <div class="transitionContainer">

    <div class="transition-row row-1">
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
    </div>

    <div class="transition-row row-2">
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
    </div>

  </div>

</body>

</html>
